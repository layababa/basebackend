syntax = "proto3";
package xinxiwang;
option java_package = "com.layababateam.xinxiwang_backend.proto";
option java_multiple_files = true;

// ── 会话 DTO ──

message ConversationDto {
  string id = 1;
  int32 type = 2;                              // 0=private, 1=group, 2=special_private

  // 私聊对端信息
  optional string peer_user_id = 3;
  optional string peer_user_name = 4;
  optional string peer_user_avatar = 5;

  // 最后一条消息
  optional string last_message_content = 6;
  int32 last_message_content_type = 7;
  optional string last_message_sender_id = 8;
  optional int64 last_message_time = 9;

  // 未读 & 已读
  int64 unread_count = 10;
  int64 read_seq_id = 11;

  // 用户级设置
  bool pinned = 12;
  bool muted = 13;
  int64 created_at = 14;

  // 群组字段 (type=1)
  optional string group_name = 15;
  optional string group_avatar = 16;
  optional string owner_id = 17;
  int32 member_count = 18;
  bool mute_all = 19;
  bool block_links = 20;
  optional string announcement = 21;
  optional string my_nickname = 22;
  optional string group_remark = 23;
  bool saved_to_contacts = 24;
  repeated int64 mentioned_seq_ids = 25;
  optional string peer_remark = 26;

  // 置顶消息
  optional string pinned_message_id = 27;
  optional string pinned_message_content = 28;
  optional int32 pinned_message_content_type = 29;
  optional string pinned_message_sender_name = 30;
  optional int64 pinned_message_seq_id = 31;
  optional string pinned_by = 32;
}

// ── 请求：获取会话列表 ──

message ConversationListRequest {
  optional int64 after_timestamp = 1;    // 增量同步：取此时间戳之后的会话
  optional int32 limit = 2;              // 分页大小 (1-50)
  optional int64 before_timestamp = 3;   // 分页游标：取此时间戳之前的会话
}

// ── 响应：会话列表 ──

message ConversationListResponse {
  repeated ConversationDto conversations = 1;
  optional bool has_more = 2;            // 分页时是否有更多数据
}

// ── 服务端推送：会话更新 ──

message ConversationUpdated {
  ConversationDto conversation = 1;
}

// ── 请求：置顶/取消置顶会话 ──

message SetConversationPinRequest {
  string conversation_id = 1;
  bool pinned = 2;
}

// ── 请求：静音/取消静音会话 ──

message SetConversationMuteRequest {
  string conversation_id = 1;
  bool muted = 2;
}

// ── 请求：设置对端备注 ──

message SetConversationPeerRemarkRequest {
  string conversation_id = 1;
  optional string remark = 2;
}
